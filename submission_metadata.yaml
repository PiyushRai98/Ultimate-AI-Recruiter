ai_tools_used:
  - "Claude"
  - "Kiro"

ai_usage_summary: |
  Used Claude/Kiro for architecture design, code review, and implementation assistance.
  All ranking logic, feature engineering, and scoring weights are original engineering work.
  No candidate data was fed to any hosted LLM during ranking.

methodology_summary: |
  Hybrid retrieval (BM25 + dense embeddings via all-MiniLM-L6-v2) narrows 100K candidates
  to top-500. Multi-dimensional feature scoring (skills, career trajectory, behavioral
  signals, experience fit) with honeypot anomaly detection. Weighted ensemble produces
  final ranking. Reasoning generated from actual profile facts. Runtime ~2 min for ranking
  step with pre-computed embeddings on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
